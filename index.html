<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JosaBet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-area img {
      height: 72px;
      width: auto;
      margin-bottom: 12px;
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .app-slogan {
      font-size: 14px;
      color: #666;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      color: #999;
      text-align: center;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .btn:hover { background: #f5f5f5; }
    .btn:last-child { margin-bottom: 0; }

    .btn-icon { width: 24px; height: 24px; flex-shrink: 0; }

    .terms {
      font-size: 12px;
      color: #999;
      text-align: center;
      line-height: 1.6;
    }

    .terms a { color: #1a6b3c; text-decoration: none; }

    .loading {
      display: none;
      text-align: center;
      padding: 16px;
      color: #666;
      font-size: 14px;
    }

    .erro {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-area">
      <img src="CARTOLA.png" alt="JosaBet" />
      <h1 class="app-name">JosaBet</h1>
      <p class="app-slogan">Monte seu time e dispute com amigos</p>
    </div>

    <div class="card">
      <p class="card-title">Entrar com</p>

      <div class="erro" id="erro"></div>

      <button class="btn" onclick="loginGoogle()">
        <svg class="btn-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar com Google
      </button>

      <button class="btn" onclick="loginFacebook()">
        <svg class="btn-icon" viewBox="0 0 24 24">
          <rect width="24" height="24" rx="6" fill="#1877F2"/>
          <path fill="white" d="M16 8h-2a1 1 0 0 0-1 1v2h3l-.5 3H13v7h-3v-7H8v-3h2V9a4 4 0 0 1 4-4h2v3z"/>
        </svg>
        Continuar com Facebook
      </button>

      <div class="loading" id="loading">Entrando... aguarde 😄</div>
    </div>

    <p class="terms">
      Ao entrar, você concorda com os
      <a href="#">Termos de Uso</a> e a
      <a href="#">Política de Privacidade</a>
    </p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoegwWC-xT7nXHQCwOCf2oM2IzYXODA8o",
      authDomain: "josabet-db231.firebaseapp.com",
      projectId: "josabet-db231",
      storageBucket: "josabet-db231.firebasestorage.app",
      messagingSenderId: "929085822183",
      appId: "1:929085822183:web:9c5b7a27cf4b355eb5be42"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    // Se já está logado, vai direto para home
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'home.html';
      }
    });

    async function fazerLogin(provider) {
      const loading = document.getElementById('loading');
      const erro = document.getElementById('erro');
      loading.style.display = 'block';
      erro.style.display = 'none';

      try {
        const result = await signInWithPopup(auth, provider);
        const token = await result.user.getIdToken();
        localStorage.setItem('josabet_token', token);
        localStorage.setItem('josabet_user', JSON.stringify({
          nome: result.user.displayName,
          foto: result.user.photoURL,
          email: result.user.email
        }));
        window.location.href = 'home.html';
      } catch (error) {
        loading.style.display = 'none';
        erro.style.display = 'block';
        erro.textContent = 'Erro ao fazer login. Tente novamente.';
        console.error(error);
      }
    }

    window.loginGoogle = () => fazerLogin(googleProvider);
    window.loginFacebook = () => fazerLogin(facebookProvider);
  </script>

</body>
</html>
