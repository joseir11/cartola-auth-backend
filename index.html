<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JosaBet - Dados Públicos</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f2f5; }
    h1 { color: #1a6b3c; }
    button { background: #1a6b3c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
    pre { background: white; padding: 10px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>⚽ JosaBet - Dados Públicos do Cartola</h1>
  <p>Escolha uma opção:</p>
  <button onclick="buscar('mercado/status')">Status do Mercado</button>
  <button onclick="buscar('atletas/mercado')">Mercado de Jogadores</button>
  <button onclick="buscar('clubes')">Clubes</button>
  <button onclick="buscar('rodadas')">Rodadas</button>
  <button onclick="buscar('partidas')">Partidas</button>
  <button onclick="buscar('videos')">Vídeos</button>
  <hr>
  <pre id="resultado">Clique em um botão para ver os dados...</pre>

  <script>
    const PROXY = 'https://josabet-proxy.onrender.com'; // seu proxy

    async function buscar(rota) {
      const resultado = document.getElementById('resultado');
      resultado.textContent = 'Carregando...';
      try {
        const res = await fetch(`${PROXY}/${rota}`);
        const data = await res.json();
        resultado.textContent = JSON.stringify(data, null, 2);
      } catch (erro) {
        resultado.textContent = 'Erro: ' + erro.message;
      }
    }
  </script>
</body>
</html>
